# AI Agent Configuration
# 修改以下配置以连接你的 LM 服务

# API 基础 URL (支持 OpenAI 兼容接口)
# 例如: https://api.openai.com/v1, https://api.deepseek.com/v1, http://localhost:11434/v1
base_url: "https://api.openai.com/v1"

# API 密钥
api_key: "sk-your-api-key-here"

# 模型 ID
# 例如: gpt-4o, deepseek-chat, qwen-plus, llama3
model: "gpt-4o"

# 最大对话轮数 (防止无限循环)
max_iterations: 20

# 是否自动确认危险操作 (执行命令、写入文件)
auto_confirm: false

# 工具目录（独立功能模块目录）
# 只需要新增/删除 tools/*.py 即可扩展或替换能力
tools_dir: "tools"
